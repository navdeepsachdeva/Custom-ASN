- name: Listen for events on a URL Check
  hosts: servera*
  sources:
    - name: Match events to URL Check
      ansible.eda.url_check:
        urls:
          - http://servera.lab.example.com/index.html
        delay: 7

  rules:
    # - name: Print the Event
    #   condition: true
    #   actions:
    #     - print_event:
    #         pretty: true

    - name: Website UP
      condition: event.url_check.status == "up"
      actions:
        - print_event:
            pretty: true

        - run_playbook:                       
            name: playbooks/serviceup.yml

    - name: Website Service Down
      condition: >
        event.url_check.status == "down" and
        event.url_check.error_msg is search("Cannot connect to host")
      actions:
        - print_event:
            pretty: true

        - run_playbook:                       
            name: playbooks/servicedown.yml

    - name: Website App Missing
      condition: >
        event.url_check.status == "down" and
        event.url_check.status_code == 404
      actions:
        - print_event:
            pretty: true

        - run_playbook:                       
            name: playbooks/webapp.yml
